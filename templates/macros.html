{% macro left_arrow_icon() %}
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left h-4 w-4 shrink-0 text-primary" aria-hidden="true">
    <path d="m12 19-7-7 7-7"></path>
    <path d="M19 12H5"></path>
</svg>
{% endmacro %}

{% macro copy_icon() %}
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy h-3 w-3" aria-hidden="true">
    <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
</svg>
{% endmacro %}

{% macro checkmark() %}
<svg xmlns="http://w3.org" width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="20 6 9 17 4 12"></polyline>
</svg>
{% endmacro %}

{% macro copy_command_button() %}
<button onclick="copyCommand(event)" class="rounded px-1.5 py-0.5 text-xs text-muted-foreground hover:bg-muted hover:text-foreground">
    <span class="inline-flex items-center gap-1">{{ copy_icon() }} Copy</span>
    <span class="inline-flex items-center gap-1 hidden">{{ checkmark() }} Copied</span>
</button>
{% endmacro %}
