{% block content %}
<div class="border-b border-border bg-surface-elevated px-6 py-4">
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight package-name"></h1>
            <p class="mt-0.5 text-sm text-muted-foreground">
                Showing <span class="num-table-rows">...</span> of <span class="num-specs">...</span> builds across all releases
            </p>
        </div>
        <button onclick="toggleInstallDialogShown(undefined)" class="inline-flex items-center gap-1.5 rounded-md bg-primary px-3 py-1.5 text-xs font-medium text-primary-foreground shadow-sm hover:bg-primary/90">
            {{ install_icon() }}
            How to install <span class="package-name"></span>
        </button>
    </div>
</div>

<div class="container">
    <div class="table-controls">
        <div class="form-control" style="width: 200px">
            <label class="label floating">
                <span class="text-gray-400 text-[10px]">Filter</span>
            </label>
            <input id="badge-options-filter" type="search" class="custom-select input-sm input border-base-300"
                oninput="filterBadgeOptions()">
            <div class="custom-select-options" id="badge-options-menu">
                <div class="menu-wrap">
                    <ul id="badge-options-list"></ul>
                </div>
            </div>
        </div>

        <div id="badge-filters"></div>

        <div class="form-control">
            <button class="custom-select">
                <span class="selected">Columns</span>
                <div class="custom-select-options">
                    <div class="menu-wrap">
                        <ul id="columns-menu"></ul>
                    </div>
                </div>
            </button>
        </div>

        <div style="display: flex; flex-direction: column;">
            <span class="text-gray-400 text-[10px]">Diffs Only</span>
            <label class="switch">
                <input type="checkbox" id="diff-mode-toggle" onchange="toggleDiffMode()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="result-summary"></div>
    </div>

    <table id="cache" class="table w-full">
        <thead>
            <tr>
                <th>Hash</th>
                <th>Version</th>
                <th>Releases</th>
                <th>Stacks</th>
                <th>Variants</th>
                <th>Platform</th>
                <th>OS</th>
                <th>Target</th>
                <th>Dependencies</th>
            </tr>
        </thead>
    </table>
</div>
{% endblock %}
