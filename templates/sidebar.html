<div id="sidebar">
    <div id="sidebar-title" onclick="navigateToHome()">
        <a class="btn btn-ghost !flex gap-2">
            <img src="{{ base_path }}/static/spack-logo.svg" class="max-h-full w-auto" />
            Spack Build Cache
        </a>
    </div>
    <div class="form-control">
        <input id="sidebar-search" type="search" class="form-control input border-base-300"
            oninput="filterSidebar(event)">
        <label class="label floating">
            <span class="text-gray-400 text-[10px]">Search</span>
        </label>
    </div>

    <div id="sidebar-tabs" class="tab-control">
        <div id="all-packages-tab" class="tab active" onclick="selectSidebarTab('all-packages')">All Packages</div>
        <div id="by-tag-tab" class="tab" onclick="selectSidebarTab('by-tag')">By Tag</div>
    </div>
    <div id="sidebar-tab-contents" class="tab-content">
        <div id="all-packages-content" class="active">
            <div id="all-packages-loading" class="status">Loading...</div>
            <div id="all-packages-nodata" class="status" style="display: none">No results.</div>
            <div id="all-packages-list" class="sidebar-list"></div>
        </div>
        <div id="by-tag-content">
            <div class="button-set">
                <a class="btn btn-secondary btn-sm" onclick="setAllSidebarGroupsOpen(true)">
                    Expand All
                </a>
                <a class="btn btn-secondary btn-sm" onclick="setAllSidebarGroupsOpen(false)">
                    Collapse All
                </a>
            </div>
            <div id="by-tag-loading" class="status">Loading...</div>
            <div id="by-tag-nodata" class="status" style="display: none">No results.</div>
            <div id="by-tag-list" class="sidebar-list"></div>
        </div>
    </div>

    <div id="sidebar-resize"></div>
</div>
